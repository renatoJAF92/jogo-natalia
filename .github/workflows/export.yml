name: Export and Deploy

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  GODOT_VERSION: "4.4.1"
  EXPORT_NAME: "destiny-tales-of-natalia"
  PROJECT_PATH: "."

jobs:
  export-web:
    name: Web Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.4.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable \
             ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable

      - name: Import assets
        run: godot --headless --editor --quit --path ${{ env.PROJECT_PATH }}

      - name: Export Web
        run: |
          mkdir -p build/web
          godot --headless --verbose --export-release "Web" \
            build/web/index.html --path ${{ env.PROJECT_PATH }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: web
          path: build/web/

      - name: Deploy to itch.io
        if: startsWith(github.ref, 'refs/tags/v')
        uses: manleydev/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: html5
          ITCH_GAME: destiny-tales-of-natalia
          ITCH_USER: ITCH_USER
          PACKAGE: build/web

  export-windows:
    name: Windows Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.4.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable \
             ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable

      - name: Import assets
        run: godot --headless --editor --quit --path ${{ env.PROJECT_PATH }}

      - name: Export Windows
        run: |
          mkdir -p build/windows
          godot --headless --verbose --export-release "Windows Desktop" \
            build/windows/${{ env.EXPORT_NAME }}.exe --path ${{ env.PROJECT_PATH }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: build/windows/

      - name: Deploy to itch.io
        if: startsWith(github.ref, 'refs/tags/v')
        uses: manleydev/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: windows
          ITCH_GAME: destiny-tales-of-natalia
          ITCH_USER: ITCH_USER
          PACKAGE: build/windows

  export-macos:
    name: macOS Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.4.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable \
             ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable

      - name: Import assets
        run: godot --headless --editor --quit --path ${{ env.PROJECT_PATH }}

      - name: Export macOS
        run: |
          mkdir -p build/mac
          godot --headless --verbose --export-release "macOS" \
            build/mac/${{ env.EXPORT_NAME }}.zip --path ${{ env.PROJECT_PATH }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: build/mac/

      - name: Deploy to itch.io
        if: startsWith(github.ref, 'refs/tags/v')
        uses: manleydev/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: osx
          ITCH_GAME: destiny-tales-of-natalia
          ITCH_USER: ITCH_USER
          PACKAGE: build/mac
